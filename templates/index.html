<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; }
        .main-card { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); padding: 2rem; margin-top: 50px; }
        .history-card { background: rgba(0, 0, 0, 0.2); border-radius: 15px; padding: 1rem; margin-top: 2rem; }
        .list-group-item { background: transparent; color: white; border-color: rgba(255,255,255,0.1); }
        .temp { font-size: 4rem; font-weight: bold; }
        input { border-radius: 10px 0 0 10px !important; }
        button { border-radius: 0 10px 10px 0 !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="main-card text-center shadow-lg">
                    <h2 class="mb-4">🌤 Поиск погоды</h2>

                    <form method="POST" class="input-group mb-4">
                        <input type="text" name="city" class="form-control" placeholder="Введите город..." required>
                        <button class="btn btn-warning" type="submit">Узнать</button>
                    </form>

                    {% if weather %}
                        <div class="py-3">
                            <h3>{{ weather.city }}</h3>
                            <div class="temp">{{ weather.temp }}°C</div>
                            <p class="text-capitalize lead">{{ weather.desc }}</p>
                            <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@4x.png" alt="icon">
                        </div>
                    {% endif %}
                </div>

                <div class="history-card shadow">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">История поисков</h5>
                        <a href="/clear" class="btn btn-sm btn-outline-light">Очистить</a>
                    </div>
                    <div class="list-group list-group-flush">
                        {% for item in history %}
                            <div class="list-group-item d-flex justify-content-between align-items-center">
                                <span>{{ item.city }}</span>
                                <span class="badge bg-light text-dark">{{ item.temp }}°C, {{ item.description }}</span>
                            </div>
                        {% else %}
                            <p class="text-center text-white-50">История пуста</p>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
